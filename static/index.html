<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralMind — Viral Video Magic</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>ViralMind</h1>
        <p style="color: #6e6e73; margin-bottom: 30px;">Перетворюйте довгі відео на вірусні Shorts миттєво.</p>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Вставте посилання на відео (YouTube, TikTok...)">
        </div>

        <button id="generateBtn">Згенерувати Shorts</button>

        <div id="loader" class="loader"></div>
        <div id="status">Додайте посилання, щоб розпочати</div>

        <div id="results" class="results"></div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
