services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - downloads:/app/downloads
      - output:/app/output
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - downloads:/app/downloads
      - output:/app/output
      - ./cookies.txt:/app/cookies.txt
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  downloads:
  output:
